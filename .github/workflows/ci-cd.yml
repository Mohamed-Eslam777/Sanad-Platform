name: Sanad CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── 1. Frontend Lint & Build ───────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Build Application (Dry Run)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api
  
  # ── 2. Backend Test ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Test (Jest + Sequelize)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    # Strictly define MySQL Service for Integration Tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: sanad_db_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run Jest Test Suite
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: sanad_db
          JWT_SECRET: super_secret_test_key
          ALLOWED_ORIGIN: http://localhost:5173
        run: npm test

  # ── 3. Docker Image Build (Dry Run) ────────────────────────────────────────
  docker-dry-run:
    name: Docker Build Dry-Run
    runs-on: ubuntu-latest
    # This job depends on the success of both linting and testing
    needs: [frontend-lint-build, backend-test]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t sanad-backend:test ./backend

      - name: Build Frontend Docker Image
        run: docker build --build-arg VITE_API_URL=http://localhost:5000/api -t sanad-frontend:test ./frontend
